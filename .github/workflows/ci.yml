name: CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DJANGO_SECRET_KEY: test-secret-key
      DEBUG: "1"
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: postgres
      DB_PORT: 5432
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            ffmpeg \
            libboost-all-dev \
            libopenblas-dev \
            liblapack-dev \
            libx11-dev \
            libgtk-3-dev \
            postgresql-client

      - run: |
          python -m pip install --upgrade pip
          pip install numpy pillow scipy dlib-bin
          pip install face-recognition --no-deps
          pip install -r requirements.txt

      - run: python manage.py migrate

      - run: pytest -q